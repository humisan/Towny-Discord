name: Auto Release on Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Calculate Next Version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"

          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"

          echo "Next tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "prev_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: notes
        run: |
          PREV_TAG=${{ steps.version.outputs.prev_tag }}

          echo "Generating notes from $PREV_TAG to HEAD"

          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > release_notes.txt

          if [ ! -s release_notes.txt ]; then
            echo "- No changes detected (Manual trigger?)" > release_notes.txt
          fi

          cat release_notes.txt

      - name: Update Version in plugin.yml (Optional)
        run: |
          NEW_TAG=${{ steps.version.outputs.tag }}
          VERSION=${NEW_TAG#v}
          sed -i "s/version: .*/version: '$VERSION'/" src/main/resources/plugin.yml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Push New Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_TAG=${{ steps.version.outputs.tag }}
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.txt
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
